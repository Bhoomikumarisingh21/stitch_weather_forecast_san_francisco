<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Demo: Weather App | Bhoomi Kumari Singh</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');

    :root {
      --bg-primary: #050814;
      --card-bg: rgba(22, 30, 49, 0.45);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-color: #06b6d4; /* Cyan theme for Weather */
      --accent-gradient: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
      --font-heading: 'Outfit', sans-serif;
      --font-body: 'Plus Jakarta Sans', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      position: relative;
      overflow-x: hidden;
      transition: background 0.5s ease;
    }
    @media (max-width: 480px) {
      body {
        padding: 20px 12px;
      }
    }

    .glow-orb {
      position: absolute;
      width: 450px;
      height: 450px;
      border-radius: 50%;
      background: var(--accent-gradient);
      filter: blur(180px);
      opacity: 0.15;
      z-index: -1;
      top: 15%;
      left: 25%;
      transition: all 0.8s ease;
    }

    .back-btn {
      align-self: flex-start;
      margin-bottom: 30px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.03);
      padding: 8px 16px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
    }

    .back-btn:hover {
      color: var(--text-primary);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateX(-3px);
    }

    .weather-container {
      width: 100%;
      max-width: 650px;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 45px -15px rgba(0,0,0,0.6);
      position: relative;
    }
    @media (max-width: 600px) {
      .weather-container {
        padding: 20px;
        border-radius: 18px;
      }
    }
    @media (max-width: 360px) {
      .weather-container {
        padding: 16px;
      }
    }

    .search-group {
      display: flex;
      gap: 12px;
      margin-bottom: 30px;
    }
    @media (max-width: 580px) {
      .search-group {
        flex-direction: column;
        gap: 12px;
      }
    }

    .search-input {
      flex: 1;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      padding: 14px 20px;
      border-radius: 12px;
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s ease;
    }

    .search-input:focus {
      border-color: var(--accent-color);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 10px rgba(6, 182, 212, 0.25);
    }

    .search-btn {
      background: var(--accent-gradient);
      color: white;
      border: 1px solid transparent;
      padding: 14px 24px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-body);
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3);
    }
    @media (max-width: 580px) {
      .search-btn {
        width: 100%;
      }
    }

    .search-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(6, 182, 212, 0.5);
    }

    /* Weather Content Styles */
    .weather-display {
      transition: opacity 0.3s ease;
    }

    .weather-display.loading {
      opacity: 0.2;
      pointer-events: none;
    }

    .loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 2.5rem;
      color: var(--accent-color);
      display: none;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .main-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      flex-wrap: wrap;
      gap: 20px;
    }
    @media (max-width: 480px) {
      .main-info {
        flex-direction: column;
        text-align: center;
        gap: 15px;
      }
    }

    .location h2 {
      font-family: var(--font-heading);
      font-size: 2.25rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .location p {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .temp-card {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .temp-card i {
      font-size: 4rem;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .temp-val {
      font-family: var(--font-heading);
      font-size: 3.5rem;
      font-weight: 800;
    }

    .temp-desc {
      color: var(--text-secondary);
      font-size: 1.1rem;
      text-transform: capitalize;
    }

    .details-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }

    .detail-item {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      padding: 20px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .detail-item i {
      font-size: 1.5rem;
      color: var(--accent-color);
    }

    .detail-item h3 {
      font-size: 0.8rem;
      text-transform: uppercase;
      color: var(--text-secondary);
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .detail-item p {
      font-family: var(--font-heading);
      font-size: 1.2rem;
      font-weight: 600;
    }

    .forecast-section h3 {
      font-family: var(--font-heading);
      font-size: 1.25rem;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 10px;
    }

    .forecast-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
    }

    .forecast-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      padding: 16px 8px;
      border-radius: 12px;
      text-align: center;
      transition: all 0.3s ease;
    }

    .forecast-card:hover {
      background: rgba(255, 255, 255, 0.05);
      transform: translateY(-3px);
    }

    .forecast-day {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .forecast-card i {
      font-size: 1.5rem;
      margin-bottom: 8px;
      color: var(--accent-color);
    }

    .forecast-temp {
      font-family: var(--font-heading);
      font-size: 1rem;
      font-weight: 700;
    }

    @media (max-width: 580px) {
      .details-grid {
        grid-template-columns: 1fr;
      }
      .forecast-grid {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
      }
      .forecast-card {
        flex: 1 1 80px;
        max-width: 100px;
      }
    }
  </style>
</head>
<body>
  <div class="glow-orb" id="glow-orb"></div>

  <a class='back-btn' href='/'><i class="fa-solid fa-arrow-left"></i> Back to Portfolio</a>

  <div class="weather-container">
    <i class="fa-solid fa-circle-notch loader" id="loader"></i>
    
    <div class="search-group">
      <input type="text" id="search-input" class="search-input" placeholder="Search for a city (e.g. New Delhi, London, Tokyo...)" autocomplete="off">
      <button id="search-btn" class="search-btn"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
    </div>

    <div class="weather-display" id="weather-display">
      <div class="main-info">
        <div class="location">
          <h2 id="city-name">New Delhi</h2>
          <p id="weather-date">Friday, June 5</p>
        </div>
        <div class="temp-card">
          <i class="fa-solid fa-cloud-sun" id="weather-icon"></i>
          <div>
            <div class="temp-val" id="temp-value">32°C</div>
            <div class="temp-desc" id="weather-desc">scattered clouds</div>
          </div>
        </div>
      </div>

      <div class="details-grid">
        <div class="detail-item">
          <i class="fa-solid fa-droplet"></i>
          <div>
            <h3>Humidity</h3>
            <p id="humidity-val">58%</p>
          </div>
        </div>
        <div class="detail-item">
          <i class="fa-solid fa-wind"></i>
          <div>
            <h3>Wind Speed</h3>
            <p id="wind-val">12 km/h</p>
          </div>
        </div>
        <div class="detail-item">
          <i class="fa-regular fa-sun"></i>
          <div>
            <h3>UV Index</h3>
            <p id="uv-val">8 (Very High)</p>
          </div>
        </div>
        <div class="detail-item">
          <i class="fa-solid fa-gauge-high"></i>
          <div>
            <h3>Pressure</h3>
            <p id="pressure-val">1008 hPa</p>
          </div>
        </div>
      </div>

      <div class="forecast-section">
        <h3>5-Day Forecast</h3>
        <div class="forecast-grid" id="forecast-grid">
          <!-- Dynamic forecast items -->
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const searchInput = document.getElementById('search-input');
      const searchBtn = document.getElementById('search-btn');
      const weatherDisplay = document.getElementById('weather-display');
      const loader = document.getElementById('loader');
      const glowOrb = document.getElementById('glow-orb');

      // Elements to update
      const cityNameEl = document.getElementById('city-name');
      const dateEl = document.getElementById('weather-date');
      const tempValEl = document.getElementById('temp-value');
      const weatherDescEl = document.getElementById('weather-desc');
      const weatherIconEl = document.getElementById('weather-icon');
      const humidityEl = document.getElementById('humidity-val');
      const windEl = document.getElementById('wind-val');
      const uvEl = document.getElementById('uv-val');
      const pressureEl = document.getElementById('pressure-val');
      const forecastGrid = document.getElementById('forecast-grid');

      // Preset Weather Database for demonstration
      const database = {
        'new delhi': {
          temp: 39, desc: 'clear sky', icon: 'fa-sun', humidity: 30, wind: 15, uv: '11 (Extreme)', pressure: 1002,
          forecast: [
            { day: 'Sat', temp: 40, icon: 'fa-sun' },
            { day: 'Sun', temp: 41, icon: 'fa-sun' },
            { day: 'Mon', temp: 39, icon: 'fa-cloud-sun' },
            { day: 'Tue', temp: 37, icon: 'fa-cloud-showers-heavy' },
            { day: 'Wed', temp: 38, icon: 'fa-cloud-sun' }
          ],
          color: 'linear-gradient(135deg, #f97316 0%, #ec4899 100%)' // Hot glow
        },
        'london': {
          temp: 14, desc: 'light rain', icon: 'fa-cloud-showers-water', humidity: 85, wind: 24, uv: '3 (Low)', pressure: 1014,
          forecast: [
            { day: 'Sat', temp: 13, icon: 'fa-cloud-rain' },
            { day: 'Sun', temp: 15, icon: 'fa-cloud-sun' },
            { day: 'Mon', temp: 16, icon: 'fa-sun' },
            { day: 'Tue', temp: 14, icon: 'fa-cloud' },
            { day: 'Wed', temp: 12, icon: 'fa-cloud-showers-heavy' }
          ],
          color: 'linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%)' // Rain blue glow
        },
        'tokyo': {
          temp: 22, desc: 'mostly cloudy', icon: 'fa-cloud-sun', humidity: 65, wind: 10, uv: '6 (High)', pressure: 1010,
          forecast: [
            { day: 'Sat', temp: 24, icon: 'fa-sun' },
            { day: 'Sun', temp: 23, icon: 'fa-cloud-sun' },
            { day: 'Mon', temp: 20, icon: 'fa-cloud-rain' },
            { day: 'Tue', temp: 21, icon: 'fa-cloud' },
            { day: 'Wed', temp: 23, icon: 'fa-sun' }
          ],
          color: 'linear-gradient(135deg, #a855f7 0%, #6366f1 100%)' // Cloud purple glow
        }
      };

      // Hashed Generator for any city
      function generateMockWeather(city) {
        const hash = Array.from(city).reduce((acc, char) => acc + char.charCodeAt(0), 0);
        const temp = Math.abs(hash % 35) + 5; // Temperature between 5 and 40
        const humidity = Math.abs(hash % 60) + 35; // Humidity between 35 and 95
        const wind = Math.abs(hash % 30) + 5; // Wind between 5 and 35
        const pressure = Math.abs(hash % 25) + 995;
        
        let desc = 'clear sky';
        let icon = 'fa-sun';
        let color = 'linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%)';

        if (hash % 4 === 0) {
          desc = 'heavy rain';
          icon = 'fa-cloud-showers-heavy';
          color = 'linear-gradient(135deg, #3b82f6 0%, #1e3a8a 100%)';
        } else if (hash % 4 === 1) {
          desc = 'overcast clouds';
          icon = 'fa-cloud';
          color = 'linear-gradient(135deg, #64748b 0%, #334155 100%)';
        } else if (hash % 4 === 2) {
          desc = 'thunderstorm';
          icon = 'fa-cloud-bolt';
          color = 'linear-gradient(135deg, #6366f1 0%, #312e81 100%)';
        } else if (hash % 4 === 3 && temp > 30) {
          desc = 'sunny & dry';
          icon = 'fa-sun';
          color = 'linear-gradient(135deg, #f59e0b 0%, #d97706 100%)';
        }

        const uvIndex = Math.abs(hash % 10) + 1;
        let uvText = `${uvIndex} (Moderate)`;
        if (uvIndex <= 2) uvText = `${uvIndex} (Low)`;
        else if (uvIndex >= 8) uvText = `${uvIndex} (Very High)`;

        // Forecast days
        const days = ['Sat', 'Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri'];
        const currentDayIdx = new Date().getDay();
        const forecast = [];
        for (let i = 1; i <= 5; i++) {
          const dayName = days[(currentDayIdx + i) % 7];
          const fHash = hash + i;
          let fIcon = 'fa-sun';
          if (fHash % 3 === 0) fIcon = 'fa-cloud';
          else if (fHash % 3 === 1) fIcon = 'fa-cloud-showers-heavy';
          
          forecast.push({
            day: dayName,
            temp: temp + (fHash % 6 - 3), // slight offset
            icon: fIcon
          });
        }

        return { temp, desc, icon, humidity, wind, uv: uvText, pressure, forecast, color };
      }

      function updateWeatherUI(cityName) {
        const query = cityName.trim().toLowerCase();
        
        // Show loading state
        weatherDisplay.classList.add('loading');
        loader.style.display = 'block';

        setTimeout(() => {
          let data = database[query];
          if (!data) {
            data = generateMockWeather(cityName);
          }

          // Update text
          cityNameEl.textContent = cityName.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
          tempValEl.textContent = `${data.temp}°C`;
          weatherDescEl.textContent = data.desc;
          humidityEl.textContent = `${data.humidity}%`;
          windEl.textContent = `${data.wind} km/h`;
          uvEl.textContent = data.uv;
          pressureEl.textContent = `${data.pressure} hPa`;
          
          // Update icons & glows
          weatherIconEl.className = `fa-solid ${data.icon}`;
          glowOrb.style.background = data.color;

          // Render Forecast
          forecastGrid.innerHTML = '';
          data.forecast.forEach(f => {
            const card = document.createElement('div');
            card.className = 'forecast-card';
            card.innerHTML = `
              <div class="forecast-day">${f.day}</div>
              <i class="fa-solid ${f.icon}"></i>
              <div class="forecast-temp">${f.temp}°C</div>
            `;
            forecastGrid.appendChild(card);
          });

          // Date format
          const options = { weekday: 'long', month: 'long', day: 'numeric' };
          dateEl.textContent = new Date().toLocaleDateString('en-US', options);

          // Hide loading state
          weatherDisplay.classList.remove('loading');
          loader.style.display = 'none';
        }, 800);
      }

      searchBtn.addEventListener('click', () => {
        const city = searchInput.value.trim();
        if (city) updateWeatherUI(city);
      });

      searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          const city = searchInput.value.trim();
          if (city) updateWeatherUI(city);
        }
      });

      // Initial city load
      updateWeatherUI('New Delhi');
    });
  </script>
</body>
</html>
